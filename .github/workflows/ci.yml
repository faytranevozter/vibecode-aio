name: CI

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - docker-entrypoint.sh
      - VERSION
      - package.json
      - .github/workflows/**
      - scripts/**
  pull_request:
    paths:
      - Dockerfile
      - docker-entrypoint.sh
      - VERSION
      - package.json
      - .github/workflows/**
      - scripts/**

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [alpine, debian]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Read package versions from Dockerfile
        id: versions
        run: |
          ninerouter=$(sed -n 's/^ARG NINEROUTER_VERSION=//p' Dockerfile | head -n1)
          opencode=$(sed -n 's/^ARG OPENCODE_VERSION=//p' Dockerfile | head -n1)
          openchamber=$(sed -n 's/^ARG OPENCHAMBER_VERSION=//p' Dockerfile | head -n1)
          app=$(tr -d '[:space:]' < VERSION)
          echo "ninerouter=${ninerouter}" >> "$GITHUB_OUTPUT"
          echo "opencode=${opencode}" >> "$GITHUB_OUTPUT"
          echo "openchamber=${openchamber}" >> "$GITHUB_OUTPUT"
          echo "app=${app}" >> "$GITHUB_OUTPUT"

      - name: Build ${{ matrix.target }} (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          push: false
          load: true
          tags: vibecode-aio:ci-${{ matrix.target }}
          build-args: |
            NINEROUTER_VERSION=${{ steps.versions.outputs.ninerouter }}
            OPENCODE_VERSION=${{ steps.versions.outputs.opencode }}
            OPENCHAMBER_VERSION=${{ steps.versions.outputs.openchamber }}
          cache-from: type=gha,scope=ci-${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=ci-${{ matrix.target }}

      - name: Smoke CLI versions
        run: |
          docker run --rm --entrypoint sh vibecode-aio:ci-${{ matrix.target }} -c \
            'node --version && opencode --version && openchamber --version && 9router --version'
