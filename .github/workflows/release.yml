name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  release:
    name: Publish ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: alpine
            is_default: true
          - target: debian
            is_default: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Image name (lowercase)
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Parse tag
        id: meta
        run: |
          raw="${GITHUB_REF_NAME}"
          version="${raw#v}"
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$'; then
            echo "error: tag must be vX.Y.Z (got ${raw})" >&2
            exit 1
          fi
          file_version="$(tr -d '[:space:]' < VERSION)"
          if [ "$version" != "$file_version" ]; then
            echo "error: git tag v${version} does not match VERSION file (${file_version})" >&2
            echo "Bump VERSION/package.json, commit, then tag v\$(cat VERSION)." >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${raw}" >> "$GITHUB_OUTPUT"

      - name: Read package versions from Dockerfile
        id: versions
        run: |
          echo "ninerouter=$(sed -n 's/^ARG NINEROUTER_VERSION=//p' Dockerfile | head -n1)" >> "$GITHUB_OUTPUT"
          echo "opencode=$(sed -n 's/^ARG OPENCODE_VERSION=//p' Dockerfile | head -n1)" >> "$GITHUB_OUTPUT"
          echo "openchamber=$(sed -n 's/^ARG OPENCHAMBER_VERSION=//p' Dockerfile | head -n1)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=v${{ steps.meta.outputs.version }}-${{ matrix.target }}
            type=raw,value=${{ matrix.target }}
            type=raw,value=latest,enable=${{ matrix.is_default }}
          labels: |
            org.opencontainers.image.title=vibecode-aio
            org.opencontainers.image.description=9router + OpenCode + OpenChamber
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push ${{ matrix.target }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          build-args: |
            NINEROUTER_VERSION=${{ steps.versions.outputs.ninerouter }}
            OPENCODE_VERSION=${{ steps.versions.outputs.opencode }}
            OPENCHAMBER_VERSION=${{ steps.versions.outputs.openchamber }}
          cache-from: type=gha,scope=release-${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.target }}

      - name: Summary
        run: |
          {
            echo "## Published \`${{ matrix.target }}\`"
            echo ""
            echo "\`\`\`"
            echo "${{ steps.docker_meta.outputs.tags }}"
            echo "\`\`\`"
            echo ""
            echo "| Component | Version |"
            echo "| --- | --- |"
            echo "| vibecode-aio | ${{ steps.meta.outputs.version }} |"
            echo "| 9router | ${{ steps.versions.outputs.ninerouter }} |"
            echo "| opencode-ai | ${{ steps.versions.outputs.opencode }} |"
            echo "| @openchamber/web | ${{ steps.versions.outputs.openchamber }} |"
          } >> "$GITHUB_STEP_SUMMARY"
